name: Generate Pac-Man

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate Pac-Man animation
        uses: Platane/snk@v3
        with:
          github_user_name: roxZach
          outputs: |
            dist/pacman.svg?palette=github-dark&color_snake=yellow&color_dots=#00ff41,#006600,#003300
            dist/pacman-dark.svg?palette=github-dark&color_snake=yellow&color_dots=#00ff41,#006600,#003300

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
